[tasks.build]
alias = "b"
description = "Build the sortie binary"
run = "go build -o ~/bin/sortie ./cmd/sortie"

[tasks.daemon]
alias = "d"
description = "Start the daemon"
run = "sortie daemon start"

[tasks."daemon:fg"]
description = "Start the daemon in foreground mode"
run = "./sortie daemon start -f"
depends = ["build"]

[tasks.db]
description = "Open SQLite database console"
run = "sqlite3 $(git rev-parse --show-toplevel)/.sortie/tasks.db"

[tasks.tui]
alias = "t"
description = "Launch the TUI"
run = "sortie tui"

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks."test:integration"]
alias = "ti"
description = "Run all tests including integration tests"
run = "go test -tags integration ./..."

[tasks.e2e-test]
description = "Run end-to-end test via Claude Code"
run = "claude --dangerously-skip-permissions 'Run the /e2e-test command'"

[tasks.claude]
alias = "c"
description = "Launch Claude Code with the local sortie plugin live-loaded from source"
run = "claude --dangerously-skip-permissions --plugin-dir ./claude-code-plugin"
